
# SEO settings
title: "wangjinyao"
title2: "" # default: ""
description: "从心所欲的博客"
keywords: "wangjinyao, blog"
url: http://heiswayi.github.io/thinkspace # site url
baseurl: "" # apply repo name if use it under gh-pages branch
# baseurl: null # apply null if repo name is something like username.github.io

# google_analytics: UA-XXXXX-XX
# repo: http://github.com/heiswayi/thinkspace
# disqus_shortname: "hnbloggithub"
# twitter_username: "HeiswayiNrird"
comments: false

# Build settings
permalink   : /:year/:title/
markdown    : kramdown
highlighter : rouge

source: ./
destination: ./_site

# Sass configuration
sass:
  sass_dir: assets/scss
  style: compressed # expanded

# Author settings
author:
  name     : "王金耀"
  job      : "软件测试工程师"
  # bio      : "1+1=3 is always TRUE in my world, a balance between binary and reality."
  thumb    : /images/author.jpg
  email    : wangjinyao1992@gmail.com
  url      : http://wangjinyao.github.io
  github   : http://github.com/wangjinyao
  # twitter  : http://twitter.com/HeiswayiNrird
  # facebook : https://www.facebook.com/heiswayi.nrird
  # linkedin : http://linkedin.com/in/nrird

# social settings
og_locale: "zh-CN"
# twitter_card: "summary_large_image"
# twitter_site: "@HeiswayiNrird"

plugins:
  - bourbon
  - jekyll-paginate

# navbar pages
navbar:
  - slug : about
    title: About
  - slug : blog
    title: Blog

exclude: ["gulp", "node_modules", "bower", "bower_components", "config.rb", "src", "Gemfile", "Gemfile.lock", ".rvmrc", ".rbenv-version", "package.json", "gulpfile.js", "README.md", "Rakefile", "changelog.md"]
